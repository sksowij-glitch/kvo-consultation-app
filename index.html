<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Система заявок на консультацію</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-container">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        <h1>Консультації</h1>
      </div>
      <div class="header-actions">
        <button id="btn-reset" class="btn btn-secondary">Скинути демо-дані</button>
        <button id="btn-new-request" class="btn btn-primary">Нова заявка</button>
      </div>
    </div>
  </header>

  <!-- Dashboard Stats -->
  <section class="dashboard">
    <div class="stat-card total">
      <div class="stat-info">
        <h3>Всього заявок</h3>
        <p id="stat-total">0</p>
      </div>
    </div>
    <div class="stat-card pending">
      <div class="stat-info">
        <h3>Очікують відповіді</h3>
        <p id="stat-pending">0</p>
      </div>
    </div>
    <div class="stat-card confirmed">
      <div class="stat-info">
        <h3>Підтверджені</h3>
        <p id="stat-confirmed">0</p>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <div class="controls">
      <div class="filters">
        <select id="filter-status" class="select-input">
          <option value="All">Всі статуси</option>
          <option value="Draft">Чернетки</option>
          <option value="Submitted">Подані (очікують)</option>
          <option value="Confirmed">Підтверджені</option>
          <option value="Cancelled">Скасовані</option>
        </select>
        <select id="filter-subject" class="select-input">
          <option value="All">Всі предмети</option>
        </select>
      </div>
      <div class="sorting">
        <select id="sort-by" class="select-input">
          <option value="date-asc">Дата зустрічі (за зростанням)</option>
          <option value="date-desc">Дата зустрічі (за спаданням)</option>
          <option value="created-desc">Спочатку нові</option>
          <option value="created-asc">Спочатку старі</option>
        </select>
      </div>
    </div>

    <div id="request-list" class="request-list">
      <!-- Cards rendered via JS -->
    </div>
    <div id="empty-state" class="empty-state hidden">
      <p>Заявок не знайдено</p>
    </div>
  </main>

  <!-- Request Form Modal -->
  <div id="modal-form" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Нова заявка</h2>
        <button id="btn-close-modal" class="btn-icon">&times;</button>
      </div>
      <form id="request-form">
        <input type="hidden" id="form-id">
        <input type="hidden" id="form-status" value="Draft">
        <div class="form-group">
          <label for="form-subject">Предмет <span class="required">*</span></label>
          <input type="text" id="form-subject" list="subject-list" class="text-input" placeholder="Наприклад, Електродинаміка">
          <datalist id="subject-list">
            <option value="Електродинаміка">
            <option value="Схемотехніка">
            <option value="Фізика НВЧ">
            <option value="Вища математика">
          </datalist>
        </div>
        <div class="form-group">
          <label for="form-topic">Тема запиту <span class="required">*</span></label>
          <textarea id="form-topic" class="text-input" placeholder="Коротко опишіть питання (5-300 символів)" minlength="5" maxlength="300"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="form-date">Бажана дата <span class="required">*</span></label>
            <input type="date" id="form-date" class="text-input">
          </div>
          <div class="form-group">
            <label for="form-time">Бажаний час (08:30 - 18:00) <span class="required">*</span></label>
            <input type="time" id="form-time" class="text-input" min="08:30" max="18:00">
          </div>
        </div>
        <div id="form-errors" class="form-errors hidden"></div>
        <div class="modal-actions" id="modal-actions">
          <button type="button" id="btn-save-draft" class="btn btn-secondary">Зберегти чернетку</button>
          <button type="submit" id="btn-submit-request" class="btn btn-primary">Подати заявку</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
